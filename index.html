<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВкусДоставка — Дизайн проект</title>
    <!-- Font Awesome 5 (иконки) -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            transition: background-color 0.3s, color 0.2s, border-color 0.2s;
        }

        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-light: #6c757d;
            --border: #e9ecef;
            --primary: #ff5e3a;
            --primary-hover: #e04b2a;
            --card-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
        }

        body.dark-theme {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #eaeaea;
            --text-light: #aaaaaa;
            --border: #333333;
            --primary: #ff7b5c;
            --primary-hover: #ff5e3a;
            --card-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР - ПРОТОТИП FIGMA В ВЕБЕ */
        .app-container {
            display: flex;
            width: 1400px;
            max-width: 100%;
            min-height: 100vh;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
            background-color: var(--surface);
            margin: 0 auto;
            position: relative;
        }

        /* ЛЕВАЯ ПАНЕЛЬ (РАБОТАЕТ) */
        .sidebar {
            width: 280px;
            background-color: var(--surface);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
            padding-left: 8px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 16px;
            font-weight: 500;
            color: var(--text-light);
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item i {
            font-size: 1.3rem;
            width: 28px;
        }

        .nav-item.active {
            background-color: var(--primary);
            color: white;
        }

        .nav-item:not(.active):hover {
            background-color: var(--bg);
            color: var(--text);
        }

        .profile-mini {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 12px;
            border-top: 1px solid var(--border);
            cursor: pointer;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--primary), #ff9f7c);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ОСНОВНОЙ КОНТЕНТ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg);
        }

        /* ХЕДЕР */
        .header {
            background-color: var(--surface);
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .address-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .address-control i {
            color: var(--primary);
        }

        .right-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .theme-toggle, .lang-toggle {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        /* КАРТОЧКИ ЕДЫ (10 ПОЗИЦИЙ) */
        .food-grid {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .food-card {
            background: var(--surface);
            border-radius: 28px;
            padding: 20px 16px 18px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .food-card:hover {
            transform: translateY(-5px);
        }

        .food-img {
            width: 100%;
            height: 150px;
            background: #d4d4d4;
            border-radius: 20px;
            margin-bottom: 16px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .food-title {
            font-weight: 700;
            font-size: 1.2rem;
        }

        .food-desc {
            color: var(--text-light);
            font-size: 0.9rem;
            margin: 5px 0 12px;
        }

        .food-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .price {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--primary);
        }

        .price:after {
            content: " ₽";
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* ПРОФИЛЬ (СПРАВОЧНОЕ ОКНО) */
        .profile-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 400px;
            max-width: 90%;
            height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 30px 25px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            transform: translateX(100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 1000;
            overflow-y: auto;
        }

        .profile-panel.open {
            transform: translateX(0);
        }

        .close-panel {
            font-size: 1.8rem;
            cursor: pointer;
            align-self: flex-end;
        }

        .avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--primary);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid var(--border);
        }

        .avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* СПОСОБЫ ОПЛАТЫ */
        .payment-methods {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .payment-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .payment-item.active {
            border-color: var(--primary);
            background: rgba(255, 94, 58, 0.1);
        }

        /* ЧАТ ПОДДЕРЖКИ */
        .chat-popup {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 350px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            z-index: 2000;
        }

        .chat-header {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 30px 30px 0 0;
            font-weight: 600;
        }

        .chat-messages {
            padding: 20px;
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
        }

        .chat-message {
            background: var(--bg);
            padding: 12px 16px;
            border-radius: 18px 18px 18px 4px;
            margin-bottom: 12px;
            width: fit-content;
            max-width: 80%;
        }

        .chat-message.support {
            background: var(--primary);
            color: white;
            margin-left: auto;
            border-radius: 18px 18px 4px 18px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: var(--bg);
            width: fit-content;
            border-radius: 30px;
            margin-bottom: 12px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-light);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.4; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-5px); }
        }

        /* СТРАНИЦА РЕГИСТРАЦИИ (ВЫХОД) */
        .register-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--surface);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .register-card {
            background: var(--bg);
            padding: 40px;
            border-radius: 60px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .hidden {
            display: none;
        }

        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">

    <!-- ЛЕВАЯ ПАНЕЛЬ (РАБОТАЕТ) -->
    <div class="sidebar">
        <div class="logo">🍜 ВкусДоставка</div>
        <div class="nav-menu">
            <div class="nav-item active" data-page="home"><i class="fas fa-utensils"></i> <span data-lang="home">Главная</span></div>
            <div class="nav-item" data-page="profile" id="openProfileBtn"><i class="fas fa-user"></i> <span data-lang="profile">Профиль</span></div>
            <div class="nav-item" id="favoritesBtn"><i class="fas fa-heart"></i> <span data-lang="favorites">Избранное</span></div>
            <div class="nav-item" id="settingsBtn"><i class="fas fa-cog"></i> <span data-lang="settings">Настройки</span></div>
            <div class="nav-item" id="helpBtn"><i class="fas fa-question-circle"></i> <span data-lang="help">Помощь</span></div>
        </div>
        <div class="profile-mini" id="miniProfile">
            <div class="avatar" id="avatarMini"><img id="avatarImgMini" src="https://i.pravatar.cc/100?u=1" alt=""></div>
            <div>
                <div><strong id="profileName">Анна С.</strong></div>
                <div style="color: var(--text-light); font-size: 0.9rem;" data-lang="editProfile">сменить фото</div>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ БЛОК -->
    <div class="main-content">
        <div class="header">
            <div class="address-control" id="changeAddressBtn">
                <i class="fas fa-map-marker-alt"></i>
                <span id="currentAddress">Москва, ул. Тверская 7</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="right-controls">
                <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> <span>Тёмная</span></div>
                <div class="lang-toggle" id="langToggle"><i class="fas fa-globe"></i> <span>RU</span></div>
            </div>
        </div>

        <!-- СЕТКА С ЕДОЙ (10 ПОЗИЦИЙ, рубли) -->
        <div class="food-grid" id="foodGrid"></div>
    </div>

    <!-- ПРОФИЛЬ ПАНЕЛЬ -->
    <div class="profile-panel" id="profilePanel">
        <div class="close-panel" id="closeProfilePanel"><i class="fas fa-times"></i></div>
        <div class="avatar-large" id="changePhotoBtn">
            <img id="avatarImgLarge" src="https://i.pravatar.cc/100?u=1" alt="">
        </div>
        <h2 style="text-align: center;" id="profileNameLarge">Анна С.</h2>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <label data-lang="paymentMethod">Способ оплаты:</label>
            <div class="payment-methods">
                <div class="payment-item active" data-pay="card"><i class="fas fa-credit-card"></i> Карта</div>
                <div class="payment-item" data-pay="qr"><i class="fas fa-qrcode"></i> QR</div>
                <div class="payment-item" data-pay="cash"><i class="fas fa-money-bill"></i> Наличные</div>
            </div>
        </div>

        <button id="logoutBtn" style="margin-top: 20px;"><i class="fas fa-sign-out-alt"></i> <span data-lang="logout">Выйти</span></button>
    </div>

    <!-- ЧАТ ПОДДЕРЖКИ -->
    <div class="chat-popup" id="chatPopup">
        <div class="chat-header">Поддержка <i class="fas fa-comment-dots"></i></div>
        <div class="chat-messages" id="chatMessages">
            <div class="chat-message">Здравствуйте! Чем помочь?</div>
        </div>
        <div style="padding: 15px;"><i class="fas fa-ellipsis-h"></i> скоро ответ...</div>
    </div>

    <!-- СТРАНИЦА РЕГИСТРАЦИИ (выход) -->
    <div class="register-page hidden" id="registerPage">
        <div class="register-card">
            <h2>🍔 ВкусДоставка</h2>
            <p data-lang="registerText">Войдите, чтобы продолжить</p>
            <button id="fakeLoginBtn"><span data-lang="loginBtn">Зарегистрироваться / Войти</span></button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- ДАННЫЕ ----------
        const foods = [
            { name: 'Маргарита', desc: 'томаты, моцарелла, базилик', price: 450, img: '🍕' },
            { name: 'Бургер BBQ', desc: 'говядина, бекон, соус BBQ', price: 390, img: '🍔' },
            { name: 'Филадельфия', desc: 'лосось, сливочный сыр', price: 620, img: '🍣' },
            { name: 'Цезарь', desc: 'курица, пармезан, соус', price: 350, img: '🥗' },
            { name: 'Рамен', desc: 'бульон, свинина, яйцо', price: 520, img: '🍜' },
            { name: 'Карбонара', desc: 'бекон, яйцо, сыр', price: 480, img: '🍝' },
            { name: 'Поке с тунцом', desc: 'тунец, авокадо, рис', price: 590, img: '🥙' },
            { name: 'Картошка фри', desc: 'с солью и травами', price: 190, img: '🍟' },
            { name: 'Чизкейк', desc: 'нью-йорк, малина', price: 320, img: '🍰' },
            { name: 'Капучино', desc: 'кофе с пенкой', price: 210, img: '☕' }
        ];

        let currentLanguage = 'ru';
        let currentTheme = 'light';
        let currentAddress = 'Москва, ул. Тверская 7';
        let currentPayment = 'card';
        let profilePhoto = 'https://i.pravatar.cc/100?u=1';
        let profileName = 'Анна С.';

        // ---------- ФУНКЦИИ ОТОБРАЖЕНИЯ ЕДЫ ----------
        function renderFood() {
            const grid = document.getElementById('foodGrid');
            grid.innerHTML = '';
            foods.forEach(item => {
                const card = document.createElement('div');
                card.className = 'food-card';
                card.innerHTML = `
                    <div class="food-img" style="background: #c0a080; display: flex; align-items: center; justify-content: center; font-size: 4rem;">${item.img}</div>
                    <div class="food-title">${item.name}</div>
                    <div class="food-desc">${item.desc}</div>
                    <div class="food-footer">
                        <span class="price">${item.price}</span>
                        <button class="add-btn"><i class="fas fa-plus"></i></button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ---------- ПАНЕЛЬ ПРОФИЛЯ ----------
        function openProfile() {
            document.getElementById('profilePanel').classList.add('open');
        }
        function closeProfile() {
            document.getElementById('profilePanel').classList.remove('open');
        }

        // ---------- ЧАТ С АНИМАЦИЕЙ ----------
        function openChat() {
            const chat = document.getElementById('chatPopup');
            chat.style.display = 'flex';
            const msgs = document.getElementById('chatMessages');
            msgs.innerHTML = '<div class="chat-message">Здравствуйте! Чем помочь?</div>';

            // анимация печати
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            msgs.appendChild(typingDiv);

            setTimeout(() => {
                msgs.removeChild(typingDiv);
                const supportMsg = document.createElement('div');
                supportMsg.className = 'chat-message support';
                supportMsg.innerText = 'Соединяю со специалистом...';
                msgs.appendChild(supportMsg);
            }, 2000);

            setTimeout(() => {
                const supportMsg2 = document.createElement('div');
                supportMsg2.className = 'chat-message support';
                supportMsg2.innerText = 'Здравствуйте! Я Елена, чем могу помочь?';
                msgs.appendChild(supportMsg2);
            }, 5000);
        }

        // ---------- ПЕРЕКЛЮЧЕНИЕ ТЕМЫ ----------
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const themeBtn = document.querySelector('#themeToggle span');
            if (document.body.classList.contains('dark-theme')) {
                themeBtn.innerText = currentLanguage === 'ru' ? 'Светлая' : 'Light';
            } else {
                themeBtn.innerText = currentLanguage === 'ru' ? 'Тёмная' : 'Dark';
            }
        }

        // ---------- ПЕРЕКЛЮЧЕНИЕ ЯЗЫКА (УПРОЩЕННО) ----------
        function toggleLang() {
            currentLanguage = currentLanguage === 'ru' ? 'en' : 'ru';
            document.querySelector('#langToggle span').innerText = currentLanguage.toUpperCase();
            // Обновить тексты (выборочно)
            const elements = document.querySelectorAll('[data-lang]');
            elements.forEach(el => {
                const key = el.getAttribute('data-lang');
                if (currentLanguage === 'ru') {
                    if (key === 'home') el.innerText = 'Главная';
                    else if (key === 'profile') el.innerText = 'Профиль';
                    else if (key === 'favorites') el.innerText = 'Избранное';
                    else if (key === 'settings') el.innerText = 'Настройки';
                    else if (key === 'help') el.innerText = 'Помощь';
                    else if (key === 'editProfile') el.innerText = 'сменить фото';
                    else if (key === 'paymentMethod') el.innerText = 'Способ оплаты:';
                    else if (key === 'logout') el.innerText = 'Выйти';
                    else if (key === 'registerText') el.innerText = 'Войдите, чтобы продолжить';
                    else if (key === 'loginBtn') el.innerText = 'Зарегистрироваться / Войти';
                } else {
                    if (key === 'home') el.innerText = 'Home';
                    else if (key === 'profile') el.innerText = 'Profile';
                    else if (key === 'favorites') el.innerText = 'Favorites';
                    else if (key === 'settings') el.innerText = 'Settings';
                    else if (key === 'help') el.innerText = 'Help';
                    else if (key === 'editProfile') el.innerText = 'change photo';
                    else if (key === 'paymentMethod') el.innerText = 'Payment:';
                    else if (key === 'logout') el.innerText = 'Log out';
                    else if (key === 'registerText') el.innerText = 'Login to continue';
                    else if (key === 'loginBtn') el.innerText = 'Sign up / Log in';
                }
            });
        }

        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        window.onload = function() {
            renderFood();

            // ПРОФИЛЬ
            document.getElementById('openProfileBtn').addEventListener('click', openProfile);
            document.getElementById('miniProfile').addEventListener('click', openProfile);
            document.getElementById('closeProfilePanel').addEventListener('click', closeProfile);

            // ТЕМА
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);

            // ЯЗЫК
            document.getElementById('langToggle').addEventListener('click', toggleLang);

            // АДРЕС
            document.getElementById('changeAddressBtn').addEventListener('click', function() {
                let newAddr = prompt('Введите новый адрес:', currentAddress);
                if (newAddr) {
                    currentAddress = newAddr;
                    document.getElementById('currentAddress').innerText = newAddr;
                }
            });

            // ВЫБОР ОПЛАТЫ
            document.querySelectorAll('.payment-item').forEach(el => {
                el.addEventListener('click', function() {
                    document.querySelectorAll('.payment-item').forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    currentPayment = this.dataset.pay;
                });
            });

            // ПОМОЩЬ / ЧАТ
            document.getElementById('helpBtn').addEventListener('click', openChat);

            // СМЕНА ФОТО (мини профиль и большой)
            document.getElementById('changePhotoBtn').addEventListener('click', function() {
                let newUrl = prompt('Введите URL нового фото (оставьте пусто для случайного):', 'https://i.pravatar.cc/100?u=' + Math.random());
                if (newUrl) {
                    document.getElementById('avatarImgMini').src = newUrl;
                    document.getElementById('avatarImgLarge').src = newUrl;
                }
            });

            // ИЗБРАННОЕ (уведомление)
            document.getElementById('favoritesBtn').addEventListener('click', function() {
                alert('Функция избранного (демо)');
            });

            // НАСТРОЙКИ (уведомление)
            document.getElementById('settingsBtn').addEventListener('click', function() {
                alert('Настройки (демо)');
            });

            // ВЫХОД -> РЕГИСТРАЦИЯ
            document.getElementById('logoutBtn').addEventListener('click', function() {
                document.getElementById('registerPage').classList.remove('hidden');
                closeProfile();
            });

            // ФЕЙКОВЫЙ ВХОД (убрать регистрацию)
            document.getElementById('fakeLoginBtn').addEventListener('click', function() {
